services:
  backend:
    build: ./backend
    ports:
      - "8500:8500"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/aplasma.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3500:3500"
    depends_on:
      - backend
    restart: unless-stopped

volumes: {}
